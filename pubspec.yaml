name: education_planner
description: A personal knowledge system for managing education goals, notes, resources, and spaced-repetition review.
version: 0.2.0
homepage: https://github.com/rummel-tech/education-planner

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  intl: ^0.19.0
  uuid: ^4.2.1
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  test: ^1.24.0
  lints: ^3.0.0

flutter:
  uses-material-design: true
